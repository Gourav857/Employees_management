<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Employee Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 font-sans">

<div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

<nav class="bg-emerald-600 text-white px-6 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-xl font-bold">EMS | Employee Portal</h1>
    <button id="logout-btn" class="bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded text-sm font-semibold transition cursor-pointer">Logout</button>
</nav>

<div class="max-w-5xl mx-auto my-8 px-4 grid grid-cols-1 md:grid-cols-3 gap-6">

    <div class="bg-white p-6 rounded-xl shadow-sm h-fit">
        <h2 class="text-lg font-bold text-slate-800 border-b pb-2 mb-4">👤 My Profile</h2>
        <div class="space-y-3 text-slate-600 text-sm">
            <p><strong>Name:</strong> <span id="profile-name" class="font-medium">Loading...</span></p>
            <p><strong>Email:</strong> <span id="profile-email">Loading...</span></p>
            <p><strong>Department:</strong> <span id="profile-dept">Loading...</span></p>
            <p><strong>Designation:</strong> <span id="profile-desg">Loading...</span></p>
            <p><strong>Salary:</strong> <span id="profile-salary">Loading...</span></p>
        </div>
    </div>

    <div class="md:col-span-2 space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm">
            <h2 class="text-lg font-bold text-slate-800 border-b pb-2 mb-4">📝 Apply for Leave</h2>
            <form id="leave-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Start Date</label>
                        <input type="date" id="startDate" required class="w-full px-3 py-1.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">End Date</label>
                        <input type="date" id="endDate" required class="w-full px-3 py-1.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Reason</label>
                    <textarea id="reason" required rows="3" class="w-full px-3 py-1.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                </div>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 py-2 rounded-lg text-sm transition cursor-pointer">Submit Application</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm">
            <h2 class="text-lg font-bold text-slate-800 border-b pb-2 mb-4">📜 Leave History</h2>
            <div class="overflow-x-auto">
                <table id="leave-history-table" class="w-full text-left border-collapse text-sm">
                    <thead>
                    <tr class="bg-slate-100 text-slate-600 uppercase text-xs">
                        <th class="p-3 text-center">Dates</th>
                        <th class="p-3 text-center">Reason</th>
                        <th class="p-3 text-center">Status</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y text-slate-600">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="js/toast.js"></script>
<script src="js/employee.js"></script>
</body>
</html>

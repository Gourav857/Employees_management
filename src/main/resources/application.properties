spring.application.name=Employees_management

# ==========================================
# PRODUCTION FIX: Dynamic Variable Parsing with Secure Hard Fallback
# ==========================================
# Agar Render ka DATABASE_URL load nahi hua, toh pipeline default link (colon `:` ke baad wala) utha legi
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE ENGINE SETTINGS
# ==========================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# SPRING BOOT ACTUATOR & MONITORING CONFIGS
# ==========================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================
# HIKARI CONNECTION POOL OPTIMIZATION
# ==========================================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
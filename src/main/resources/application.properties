spring.application.name=Employees_management

# ==========================================
# CLEVER CLOUD LIVE DATABASE CONFIGURATION
# ==========================================
# HIGH INDUSTRY FIX: Added direct dynamic connection flags to bypass cloud handshakes
spring.datasource.url=jdbc:mysql://${DATABASE_URL:localhost:3306/default_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE ENGINE SETTINGS
# ==========================================
# FIXED: Upgraded dialect to dynamic modern MySQL 8+ engine to force auto-table DDL generation
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# SPRING BOOT ACTUATOR & MONITORING CONFIGS
# ==========================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================
# HIKARI CONNECTION POOL OPTIMIZATION
# ==========================================
# HIGH INDUSTRY FIX: Thread limit set to 3 to stay strictly under Clever Cloud Free tier cap (5 max)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000